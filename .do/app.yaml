name: bitlance-automation
region: sgp   # Singapore — closest to India

services:

  # ─── Node.js Express Backend (Public Service) ──────────────────────────────
  - name: bitlance-automation
    source_dir: /server
    dockerfile_path: server/Dockerfile
    github:
      repo: BitlanceAI/Bitlance_Automation
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: professional-xs   # 1 vCPU, 512MB RAM ($12/mo)
    http_port: 3001
    health_check:
      http_path: /health
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: PYTHON_API_URL
        value: ${bitlance-ai-agent.PRIVATE_URL}
      - key: GRAPHIC_AGENT_URL
        value: ${bitlance-ai-agent.PRIVATE_URL}
      - key: SUPABASE_URL
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: SUPABASE_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: SUPABASE_JWT_SECRET
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: OPENAI_API_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: PERPLEXITY_API_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: ENCRYPTION_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: ONESIGNAL_APP_ID
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: ONESIGNAL_REST_API_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: CALENDLY_PERSONAL_TOKEN
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET

  # ─── Python FastAPI AI Agent (Private Internal Service) ────────────────────
  - name: bitlance-ai-agent
    source_dir: /Ai-agents
    dockerfile_path: Ai-agents/Dockerfile
    github:
      repo: BitlanceAI/Bitlance_Automation
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: professional-s    # 1 vCPU, 1GB RAM ($12/mo)
    internal_ports:                       # Makes the service private/internal
      - 8001
    health_check:
      http_path: /
    envs:
      - key: PORT
        value: "8001"
      - key: OPENAI_API_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: PERPLEXITY_API_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: GEMINI_API_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: SERP_API_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: SUPABASE_URL
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
      - key: SUPABASE_KEY
        value: "REPLACE_WITH_YOUR_VALUE"
        type: SECRET
