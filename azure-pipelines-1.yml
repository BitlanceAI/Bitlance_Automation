trigger:
- main

variables:
  # Ensure this matches the Service Connection name you create in Azure DevOps
  dockerRegistryServiceConnection: 'BitlanceACRConnection'
  containerRegistry: 'bitlanceaiapp.azurecr.io'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and Push Stage
  jobs:
  - job: BuildAndPush
    displayName: Build and Push Images
    pool:
      vmImage: $(vmImageName)
    steps:
    # 1. Build & Push Frontend
    - task: Docker@2
      displayName: "Build & Push Frontend"
      inputs:
        command: buildAndPush
        repository: 'aiautomation-frontend'
        dockerfile: '$(Build.SourcesDirectory)/client/Dockerfile'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

    # 2. Build & Push Backend
    - task: Docker@2
      displayName: "Build & Push Backend"
      inputs:
        command: buildAndPush
        repository: 'aiautomation-backend'
        dockerfile: '$(Build.SourcesDirectory)/server/Dockerfile'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

    # 3. Build & Push Graphic Agents
    - task: Docker@2
      displayName: "Build & Push Graphic Agents"
      inputs:
        command: buildAndPush
        repository: 'aiautomation-graphic-agents'
        dockerfile: '$(Build.SourcesDirectory)/Graphic-agents/Dockerfile'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

    # 4. Build & Push AI Agents (SEO/Blog)
    - task: Docker@2
      displayName: "Build & Push AI Agents"
      inputs:
        command: buildAndPush
        repository: 'aiautomation-ai-agents'
        dockerfile: '$(Build.SourcesDirectory)/Ai-agents/Dockerfile'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

    # 5. Deploy to Azure Static Web App
    - task: AzureStaticWebApp@0
      displayName: "Deploy Frontend to Static Web App"
      inputs:
        app_location: "/client"
        output_location: "dist"
        azure_static_web_apps_api_token: '7ae01889912f92f43a2cafae1c543c8082e0380038277ff50614af4599f3be3d07-cd2aedbc-9713-4d63-a994-5eb2df49b09200f242502854560f'
