trigger:
- main

variables:
  # Ensure this matches the Service Connection name you create in Azure DevOps
  dockerRegistryServiceConnection: 'BitlanceACRConnection'
  containerRegistry: 'bitlanceaiapp.azurecr.io'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'
  # Link the group created by Azure for the SWA token
  - group: Azure-Static-Web-Apps-nice-water-02854560f-variable-group

stages:
- stage: Build
  displayName: Build and Push Stage
  jobs:
  - job: BuildAndPush
    displayName: Build and Push Images
    pool:
      vmImage: $(vmImageName)
    steps:
      # 1. Build & Push Backend
      - task: Docker@2
        displayName: "Build & Push Backend"
        inputs:
          command: buildAndPush
          repository: 'aiautomation-backend'
          dockerfile: '$(Build.SourcesDirectory)/server/Dockerfile'
          containerRegistry: $(dockerRegistryServiceConnection)
          tags: |
            $(tag)
            latest

      # 2. Build & Push Graphic Agents
      - task: Docker@2
        displayName: "Build & Push Graphic Agents"
        inputs:
          command: buildAndPush
          repository: 'aiautomation-graphic-agents'
          dockerfile: '$(Build.SourcesDirectory)/Graphic-agents/Dockerfile'
          containerRegistry: $(dockerRegistryServiceConnection)
          tags: |
            $(tag)
            latest

      # 3. Build & Push AI Agents (SEO/Blog)
      - task: Docker@2
        displayName: "Build & Push AI Agents"
        inputs:
          command: buildAndPush
          repository: 'aiautomation-ai-agents'
          dockerfile: '$(Build.SourcesDirectory)/Ai-agents/Dockerfile'
          containerRegistry: $(dockerRegistryServiceConnection)
          tags: |
            $(tag)
            latest

      # 4. Deploy Frontend to Azure Static Web App
      - task: AzureStaticWebApp@0
        displayName: "Deploy Frontend to Static Web App"
        env:
          VITE_API_URL: $(VITE_API_URL)
          VITE_API_BASE_URL: $(VITE_API_BASE_URL)
        inputs:
          azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_WATER_02854560F)
          app_location: "/client"
          output_location: "dist"
          api_location: ""
